# Cloud Build para el frontend.
# Construye la imagen pasando VITE_API_URL como ARG (Vite la inlinea en el bundle).
#
# Ejecutar:
#   gcloud builds submit --config frontend/cloudbuild.yaml \
#     --substitutions=_VITE_API_URL=https://cea-backend-XXX.run.app,_REGION=europe-west1 \
#     frontend

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cea/frontend:latest
      - --tag
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cea/frontend:${BUILD_ID}
      - --build-arg
      - VITE_API_URL=${_VITE_API_URL}
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cea/frontend:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cea/frontend:${BUILD_ID}

substitutions:
  _VITE_API_URL: ""
  _REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY
